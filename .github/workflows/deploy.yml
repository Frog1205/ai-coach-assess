name: Deploy ATLAS to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject secrets → config.js
        run: |
          cat > config.js <<'ENVEOF'
          // Auto-generated by GitHub Actions — DO NOT edit manually
          window.SUPABASE_URL      = '${{ secrets.SUPABASE_URL }}';
          window.SUPABASE_ANON_KEY = '${{ secrets.SUPABASE_ANON_KEY }}';
          window.ATLAS_AUTO_BACKFILL = true;
          window.DEEPSEEK_API_KEY  = '${{ secrets.DEEPSEEK_API_KEY }}';
          ENVEOF
        working-directory: .

      - name: Inject secrets → admin-config.js
        run: |
          cat > admin-config.js <<'ENVEOF'
          // Auto-generated by GitHub Actions — DO NOT edit manually
          window.SUPABASE_URL      = '${{ secrets.SUPABASE_URL }}';
          window.SUPABASE_ANON_KEY = '${{ secrets.SUPABASE_ANON_KEY }}';
          window.ADMIN_EMAIL       = '${{ secrets.ADMIN_EMAIL }}';
          ENVEOF
        working-directory: .

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
