name: DB Health Check

# 手动触发 ATLAS 数据库健康诊断,绕开本机代理。
# 报告:行数 / 注册分布 / 段位分布 / 题库版本使用 / 流量来源 / 漏斗转化

on:
  workflow_dispatch:

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - name: Diagnose
        run: |
          set +e
          URL="${{ secrets.SUPABASE_URL }}/rest/v1"
          KEY="${{ secrets.SUPABASE_ANON_KEY }}"
          H=(-H "apikey: $KEY" -H "Authorization: Bearer $KEY")

          echo "═════════ ① 行数 ═════════"
          for t in accounts assessments checkins reviews qbank_versions; do
            cr=$(curl -sS -D - -o /dev/null "${H[@]}" \
              -H "Prefer: count=exact" -H "Range: 0-0" \
              "$URL/$t?select=id" | grep -i "^content-range" | tr -d '\r')
            printf "  %-18s %s\n" "$t" "${cr:-(RLS 隐藏)}"
          done

          echo ""
          echo "═════════ ② 账户注册时间 (最近 20) ═════════"
          curl -sS "${H[@]}" "$URL/accounts?select=created_at,name,industry,signup_source&order=created_at.desc&limit=20"
          echo ""

          echo ""
          echo "═════════ ③ 测评 — 段位分布 + 题库版本 ═════════"
          curl -sS "${H[@]}" "$URL/assessments?select=total,level,qbank_version,taken_at&order=taken_at.desc&limit=50"
          echo ""

          echo ""
          echo "═════════ ④ 转化漏斗 ═════════"
          ACC=$(curl -sS -D - -o /dev/null "${H[@]}" -H "Prefer: count=exact" -H "Range: 0-0" "$URL/accounts?select=id" | grep -i "^content-range" | sed -E 's/.*\/([0-9]+).*/\1/' | tr -d '\r')
          ASM=$(curl -sS -D - -o /dev/null "${H[@]}" -H "Prefer: count=exact" -H "Range: 0-0" "$URL/assessments?select=id" | grep -i "^content-range" | sed -E 's/.*\/([0-9]+).*/\1/' | tr -d '\r')
          CHK=$(curl -sS -D - -o /dev/null "${H[@]}" -H "Prefer: count=exact" -H "Range: 0-0" "$URL/checkins?select=id" | grep -i "^content-range" | sed -E 's/.*\/([0-9]+).*/\1/' | tr -d '\r')
          REV=$(curl -sS -D - -o /dev/null "${H[@]}" -H "Prefer: count=exact" -H "Range: 0-0" "$URL/reviews?select=id" | grep -i "^content-range" | sed -E 's/.*\/([0-9]+).*/\1/' | tr -d '\r')
          echo "  注册账户:   $ACC"
          echo "  完成测评:   $ASM  ($([ "$ACC" -gt 0 ] && echo "scale=1; $ASM*100/$ACC" | bc 2>/dev/null || echo '-')%)"
          echo "  打卡记录:   $CHK"
          echo "  写过复盘:   $REV"
