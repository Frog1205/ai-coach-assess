name: DB Health Check

# 手动触发的数据库健康检查 — 查行数 + 抽样 + schema 自省,绕开本机代理。

on:
  workflow_dispatch:

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - name: Query all tables
        run: |
          set +e   # 不因单行报错中断,看完整诊断
          URL="${{ secrets.SUPABASE_URL }}/rest/v1"
          KEY="${{ secrets.SUPABASE_ANON_KEY }}"
          AUTH_H=(-H "apikey: $KEY" -H "Authorization: Bearer $KEY")

          echo "═════════ 1. ROW COUNTS ═════════"
          for t in accounts assessments checkins reviews qbank_versions; do
            cr=$(curl -sS -D - -o /dev/null \
              "${AUTH_H[@]}" \
              -H "Prefer: count=exact" -H "Range: 0-0" \
              "$URL/$t?select=id" | grep -i "^content-range" | tr -d '\r')
            printf "  %-18s %s\n" "$t" "${cr:-(RLS 隐藏 / 列不存在)}"
          done

          echo ""
          echo "═════════ 2. SCHEMA SAMPLE (各表 1 行,看真实列名) ═════════"
          for t in accounts assessments checkins reviews qbank_versions; do
            echo "── $t ──"
            curl -sS "${AUTH_H[@]}" "$URL/$t?select=*&limit=1" | head -c 800
            echo ""
            echo ""
          done

          echo "═════════ 3. accounts 注册时间分布 ═════════"
          curl -sS "${AUTH_H[@]}" \
            "$URL/accounts?select=created_at&order=created_at.desc&limit=50"
          echo ""
